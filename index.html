<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jar Army</title>

  <!-- OpenGraph -->
  <meta property="og:title" content="feelin' smarmy">
  <meta property="og:description" content="jar.army">
  <meta property="og:image" content="https://jar.army/jarmy.jpg">
  <meta property="og:image:width" content="160">
  <meta property="og:image:height" content="160">
  <meta property="og:url" content="https://jar.army">
  <meta property="og:type" content="website">

  <!-- Twitter/Telegram -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="feelin' smarmy">
  <meta name="twitter:description" content="jar.army">
  <meta name="twitter:image" content="https://jar.army/jarmy.jpg">

  <!-- oEmbed -->
  <link rel="alternate" type="application/json+oembed" href="https://jar.army/oembed.json">

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
    model-viewer { width: 100%; height: 100vh; }
    .ar-button { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 16px 32px; font-size: 18px; font-weight: 600; background: #fff; color: #1a1a1a; border: none; border-radius: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <model-viewer
    src="jar.glb"
    alt="3D jar model"
    ar
    ar-modes="scene-viewer webxr quick-look"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    tone-mapping="neutral"
  >
    <button slot="ar-button" class="ar-button">View in AR</button>
  </model-viewer>
</body>
</html>
